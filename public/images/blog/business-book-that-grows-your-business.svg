  <!-- Label -->
  <text x="80" y="130" font-family="Georgia, serif" font-size="18" font-weight="600" letter-spacing="3" fill="#E8A317" text-anchor="start">BEEHIVE BOOK MARKETING</text>

  <!-- Title line 1 -->
  <text x="80" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#FFFFFF" text-anchor="start">Why Most Business Books</text>

  <!-- Title line 2 -->
